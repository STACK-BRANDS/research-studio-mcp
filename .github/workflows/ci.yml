name: CI - Lint, Syntax Check, Usage Gate
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
jobs:
  lint:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      # NOTE: we deliberately do NOT `pip install -r requirements.txt` here.
      # The repo's pins currently don't resolve cleanly (httpx==0.28.1 conflicts
      # with fastmcp/mcp/google-genai/anthropic/supabase) -- pre-existing debt,
      # unrelated to the usage-reporter wave. None of the checks below need the
      # project's third-party deps: ruff bundles its own, py_compile only
      # compiles source (it never imports), and the usage gate is stdlib-only.
      # Running the worker test suite (pytest) DOES need those deps, so it stays
      # out of CI until the requirements conflict is fixed separately -- then add
      # a `test` job that installs requirements.txt and runs `pytest -q`.
      - name: Install ruff
        run: pip install ruff --quiet
      - name: Run ruff lint
        # Scoped to worker/ + the usage-gate script (this wave's surface). The
        # rest of the repo (mcp_server.py, src/services/*) carries pre-existing
        # lint debt from before the repo had CI; widen once that's cleaned up.
        run: ruff check worker check_usage_reporting.py --select E,W,F --ignore E501,W291,W293
      - name: Syntax check (py_compile, no deps needed)
        run: |
          find . -name '*.py' -not -path './venv/*' -not -path './.venv/*' -print0 \
            | xargs -0 python -m py_compile
          echo "Syntax OK"
      - name: Fleet usage-reporting gate
        run: python check_usage_reporting.py .
