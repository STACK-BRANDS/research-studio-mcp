# Baked-Secret Gate
# Canonical check source: bot-infra/shared/check_no_baked_secrets.py
# Fails if a credential is baked into source (known provider prefixes, or a
# fallback default on a secret-named env var). Scans .py/.md/.yml/.sh.
# Escape hatch: '# secret-exempt: <reason>' on the offending line.

name: Baked-Secret Gate

on:
  pull_request:
  push:
    branches: [main]

jobs:
  secret-gate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout this repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Run baked-secret gate
        run: python check_no_baked_secrets.py .
